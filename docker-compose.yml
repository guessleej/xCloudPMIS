# ============================================================
# xCloudPMIS - 企業級專案管理系統 Docker 開發環境
# ============================================================
#
# node_modules 策略（重要）：
#   ❌ 舊寫法 - /app/node_modules（匿名 Volume）
#      問題：容器被刪除後 Volume 遺失，重啟後 node_modules 消失
#   ✅ 新寫法 - backend_node_modules:/app/node_modules（Named Volume）
#      優點：Named Volume 持久保存，容器重啟後依然完整
#      首次啟動：docker-entrypoint.sh 自動安裝缺失套件
#      重建依賴：docker-compose down -v && docker-compose up --build
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  # 1. PostgreSQL 15 — 主要資料庫
  #    負責儲存所有業務資料（專案、任務、用戶等）
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: pmis-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pmis_db}
      POSTGRES_USER: ${POSTGRES_USER:-pmis_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pmis_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      # 使用 Named Volume 確保資料永久保存
      - postgres_data:/var/lib/postgresql/data
      # 初始化 SQL 腳本（首次啟動時執行）
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pmis_user} -d ${POSTGRES_DB:-pmis_db}"]
      interval: 10s      # 每 10 秒檢查一次
      timeout: 5s        # 逾時 5 秒
      retries: 5         # 失敗 5 次後標記為不健康
      start_period: 30s  # 啟動後等 30 秒再開始檢查
    networks:
      - pmis-network

  # ──────────────────────────────────────────────────────────
  # 2. pgAdmin 4 — 資料庫管理介面
  #    透過瀏覽器視覺化管理 PostgreSQL，不需要安裝任何工具
  # ──────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pmis-pgadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@pmis.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'  # 單用戶模式，開發時更方便
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy  # 等 PostgreSQL 健康後才啟動
    healthcheck:
      test: ["CMD", "wget", "-O", "-", "http://localhost:80/misc/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - pmis-network

  # ──────────────────────────────────────────────────────────
  # 3. Redis 7 — 快取伺服器
  #    加速讀取頻繁的資料（如：用戶 Session、API 回應快取）
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pmis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    # --appendonly yes：開啟 AOF 持久化，確保 Redis 重啟後資料不遺失
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pmis-network

  # ──────────────────────────────────────────────────────────
  # 4. Node.js Express — 後端 API 服務
  #    提供 RESTful API，處理業務邏輯
  # ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pmis-backend
    restart: unless-stopped
    ports:
      - "3010:3000"   # host:container（3000 已被其他專案佔用，改用 3010）
    environment:
      NODE_ENV: development
      PORT: 3000
      # 資料庫連線設定（使用服務名稱 'postgres' 當作主機名）
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-pmis_db}
      DB_USER: ${POSTGRES_USER:-pmis_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-pmis_password}
      # Prisma 需要的完整資料庫連線字串（格式：postgresql://用戶:密碼@主機:埠/資料庫）
      DATABASE_URL: postgresql://${POSTGRES_USER:-pmis_user}:${POSTGRES_PASSWORD:-pmis_password}@postgres:5432/${POSTGRES_DB:-pmis_db}?schema=public
      # Redis 連線設定
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      # JWT 金鑰（通用認證使用）
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      # App JWT（requireAuth middleware + 開發用 dev-token 端點）
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dev-app-jwt-secret-xcloud-pmis-2024}
      # 前端服務位址（OAuth 回呼後重導向用）
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      # Microsoft OAuth 2.0（填入 Azure Portal 的真實值後才能啟用 MS 帳號連線）
      OAUTH_MICROSOFT_CLIENT_ID: ${OAUTH_MICROSOFT_CLIENT_ID:-}
      OAUTH_MICROSOFT_CLIENT_SECRET: ${OAUTH_MICROSOFT_CLIENT_SECRET:-}
      OAUTH_MICROSOFT_TENANT_ID: ${OAUTH_MICROSOFT_TENANT_ID:-common}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-http://localhost:3010/auth/microsoft/callback}
    volumes:
      # 掛載原始碼，讓 nodemon 偵測檔案變更自動重啟
      - ./backend:/app
      # ✅ Named Volume（取代舊的匿名 Volume）
      #    確保 node_modules 在容器重啟後持久存在
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pmis-network

  # ──────────────────────────────────────────────────────────
  # 5. Yjs Hocuspocus — 即時協作 WebSocket 服務
  #    提供 Google Docs 式多人同時編輯能力
  #    - CRDT（Yjs）確保衝突自由合併
  #    - Redis 快取 Yjs 二進位狀態（快速重連，TTL 7 天）
  #    - PostgreSQL 持久化純文字（供 REST API 讀取）
  #    - AI 建議透過 Yjs 共享 Map 推播給所有用戶
  # ──────────────────────────────────────────────────────────
  collaboration:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pmis-collaboration
    restart: unless-stopped
    # 覆寫 Dockerfile 的 CMD：執行 Yjs 協作伺服器（不是 Express API）
    command: node services/collaboration/yjsServer.js
    ports:
      - "1234:1234"     # Yjs WebSocket 協定（y-websocket 標準埠）
    environment:
      NODE_ENV: development
      COLLAB_PORT: 1234
      DATABASE_URL: postgresql://${POSTGRES_USER:-pmis_user}:${POSTGRES_PASSWORD:-pmis_password}@postgres:5432/${POSTGRES_DB:-pmis_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      # AI 建議（選填，有設定才啟用）
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./backend:/app
      # 與 backend 共用同一個 Named Volume（相同 node_modules）
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pmis-network

  # ──────────────────────────────────────────────────────────
  # 6. AI 監控代理 — Phase 3 背景風險掃描
  #    自動偵測高風險任務，建立風險管理任務並發送 Email 通知
  # ──────────────────────────────────────────────────────────
  monitor:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pmis-monitor
    restart: unless-stopped
    command: node jobs/monitorAgent.js
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-pmis_user}:${POSTGRES_PASSWORD:-pmis_password}@postgres:5432/${POSTGRES_DB:-pmis_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CRON_AI_RISK_SCAN: ${CRON_AI_RISK_SCAN:-0 3 * * *}
      AI_RISK_THRESHOLD: ${AI_RISK_THRESHOLD:-70}
      AI_RISK_TASK_DEFAULT_ASSIGNEE: ${AI_RISK_TASK_DEFAULT_ASSIGNEE:-1}
      SCHEDULER_COMPANY_ID: ${SCHEDULER_COMPANY_ID:-}
      TZ: Asia/Taipei
      O365_CLIENT_ID: ${O365_CLIENT_ID:-}
      O365_CLIENT_SECRET: ${O365_CLIENT_SECRET:-}
      O365_TENANT_ID: ${O365_TENANT_ID:-}
      O365_SENDER_EMAIL: ${O365_SENDER_EMAIL:-}
    volumes:
      - ./backend:/app
      # 與 backend 共用同一個 Named Volume（相同 node_modules）
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pmis-network

  # ──────────────────────────────────────────────────────────
  # 7. React + Vite — 前端開發服務
  #    提供現代化的前端開發環境，支援熱更新 (HMR)
  # ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pmis-frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      # 前端呼叫後端 API 的位址
      VITE_API_URL: http://localhost:3010
      # Yjs 即時協作 WebSocket 位址
      VITE_COLLAB_WS_URL: ws://localhost:1234
    volumes:
      - ./frontend:/app
      # ✅ Named Volume（修復匿名 Volume 遺失問題）
      #    - 容器重啟後 @tiptap、yjs 等套件保持完整
      #    - docker-entrypoint.sh 啟動時自動驗證完整性
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
      - collaboration
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001', (r) => process.exit(r.statusCode < 400 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - pmis-network

# ============================================================
# 網路設定：所有服務在同一個虛擬網路中互相溝通
# ============================================================
networks:
  pmis-network:
    driver: bridge
    name: pmis-network

# ============================================================
# Volume 設定：確保資料在容器重啟後不遺失
#
# 重要：Named Volume vs 匿名 Volume
#   匿名 Volume（舊）：- /app/node_modules
#     → Docker 自動命名，docker-compose down 後容易被刪除
#   Named Volume（新）：- xxx_node_modules:/app/node_modules
#     → 明確命名，docker-compose down 不會自動刪除
#
# 強制重建 node_modules（升級依賴時使用）：
#   docker-compose down -v   # 刪除所有 Volume（含資料！請先備份）
#   docker-compose up --build
# ============================================================
volumes:
  postgres_data:
    name: pmis-postgres-data
  pgadmin_data:
    name: pmis-pgadmin-data
  redis_data:
    name: pmis-redis-data
  # ── node_modules Named Volumes（新增，防止重啟後遺失）──────
  backend_node_modules:
    name: pmis-backend-node-modules
  frontend_node_modules:
    name: pmis-frontend-node-modules
