# ════════════════════════════════════════════════════════════
# xCloudPMIS — Azure Container Apps CI/CD Pipeline
# ════════════════════════════════════════════════════════════
# 階段：build-test → build-push → deploy → summary
# 觸發：push main 自動部署，亦可手動指定版本部署
# ════════════════════════════════════════════════════════════
name: 🚀 Build, Test & Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: '版本號 (例如 1.0.4)'
        required: false
        default: ''

env:
  ACR_NAME: pmisacr3490
  ACR_LOGIN_SERVER: pmisacr3490.azurecr.io
  RESOURCE_GROUP: pmis
  BACKEND_APP: pmis-backend
  FRONTEND_APP: pmis-frontend
  NODE_VERSION: '20'

# ─────────────────────────────────────────────────────────────
# Job 1: 建置 & 測試
# ─────────────────────────────────────────────────────────────
jobs:
  build-test:
    name: 🧪 Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: 📦 Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: 🔧 Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: 📦 Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: 🏗️ Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: /api
        run: npm run build

      - name: ✅ Build verification
        run: |
          echo "Backend dependencies: ✅"
          echo "Prisma client: ✅"
          echo "Frontend build: ✅"
          ls -la frontend/dist/

  # ─────────────────────────────────────────────────────────────
  # Job 2: Docker 建置 & 推送至 ACR
  # ─────────────────────────────────────────────────────────────
  build-push:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      app_version: ${{ steps.version.outputs.APP_VERSION }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🏷️ Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            echo "APP_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
            echo "APP_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION="$(date +%Y%m%d)-${GITHUB_SHA::7}"
            echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
            echo "APP_VERSION=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🐳 Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: 🏗️ Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/pmis-backend:${{ env.APP_VERSION }}
            ${{ env.ACR_LOGIN_SERVER }}/pmis-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: 🏗️ Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/pmis-frontend:${{ env.APP_VERSION }}
            ${{ env.ACR_LOGIN_SERVER }}/pmis-frontend:latest
          build-args: |
            VITE_API_URL=/api
            VITE_APP_VERSION=${{ env.APP_VERSION }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─────────────────────────────────────────────────────────────
  # Job 3: 部署到 Azure Container Apps
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-push
    environment: production
    steps:
      - name: 🔐 Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🚀 Deploy Backend Container App
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az containerapp update \
              --name ${{ env.BACKEND_APP }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.ACR_LOGIN_SERVER }}/pmis-backend:${{ needs.build-push.outputs.app_version }}

      - name: 🚀 Deploy Frontend Container App
        uses: azure/CLI@v1
        with:
          inlineScript: |
            BACKEND_FQDN=$(az containerapp show \
              --name ${{ env.BACKEND_APP }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query properties.configuration.ingress.fqdn -o tsv)
            az containerapp update \
              --name ${{ env.FRONTEND_APP }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.ACR_LOGIN_SERVER }}/pmis-frontend:${{ needs.build-push.outputs.app_version }} \
              --set-env-vars "BACKEND_HOST=${BACKEND_FQDN}"

      - name: ⏳ Wait for deployment stabilization
        run: sleep 30

      - name: 🔍 Verify Backend health
        uses: azure/CLI@v1
        with:
          inlineScript: |
            BACKEND_FQDN=$(az containerapp show \
              --name ${{ env.BACKEND_APP }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query properties.configuration.ingress.fqdn -o tsv)
            echo "BACKEND_URL=https://${BACKEND_FQDN}" >> $GITHUB_ENV
            curl -sf "https://${BACKEND_FQDN}/health" || echo "⚠️ Backend health check pending"

      - name: 🔍 Verify Frontend health
        uses: azure/CLI@v1
        with:
          inlineScript: |
            FRONTEND_FQDN=$(az containerapp show \
              --name ${{ env.FRONTEND_APP }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query properties.configuration.ingress.fqdn -o tsv)
            echo "FRONTEND_URL=https://${FRONTEND_FQDN}" >> $GITHUB_ENV
            curl -sf "https://${FRONTEND_FQDN}" || echo "⚠️ Frontend health check pending"

      - name: 🔐 Azure logout
        run: az logout
        if: always()

  # ─────────────────────────────────────────────────────────────
  # Job 4: 部署摘要
  # ─────────────────────────────────────────────────────────────
  summary:
    name: 📋 Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-push, deploy]
    if: always() && needs.build-push.result == 'success'
    steps:
      - name: 📋 Generate summary
        run: |
          echo "## 🚀 xCloudPMIS 部署摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📌 版本 | \`${{ needs.build-push.outputs.app_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔀 Commit | \`${GITHUB_SHA::7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 👤 觸發者 | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 時間 | $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M:%S') |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Build | ✅ 成功 |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Deploy | ${{ needs.deploy.result == 'success' && '✅ 成功' || '❌ 失敗' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🐳 映像" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: \`${{ env.ACR_LOGIN_SERVER }}/pmis-backend:${{ needs.build-push.outputs.app_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: \`${{ env.ACR_LOGIN_SERVER }}/pmis-frontend:${{ needs.build-push.outputs.app_version }}\`" >> $GITHUB_STEP_SUMMARY
