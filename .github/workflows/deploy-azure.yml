# ════════════════════════════════════════════════════════════
# xCloudPMIS — Azure Container Apps 自動部署
# 觸發：推送到 main 分支
# ════════════════════════════════════════════════════════════
name: Build & Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: '版本號 (例如 1.0.4)'
        required: false
        default: 'latest'

env:
  ACR_NAME: pmisacr3490
  ACR_LOGIN_SERVER: pmisacr3490.azurecr.io
  RESOURCE_GROUP: pmis
  BACKEND_APP: pmis-backend
  FRONTEND_APP: pmis-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ] && [ "${{ github.event.inputs.version }}" != "latest" ]; then
            echo "APP_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "APP_VERSION=$(date +%Y%m%d)-${GITHUB_SHA::7}" >> $GITHUB_ENV
          fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & Push Backend Image
        run: |
          docker build \
            --file docker/backend/Dockerfile.prod \
            --tag ${{ env.ACR_LOGIN_SERVER }}/pmis-backend:${{ env.APP_VERSION }} \
            --tag ${{ env.ACR_LOGIN_SERVER }}/pmis-backend:latest \
            .
          docker push ${{ env.ACR_LOGIN_SERVER }}/pmis-backend:${{ env.APP_VERSION }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/pmis-backend:latest

      - name: Build & Push Frontend Image
        run: |
          docker build \
            --file docker/frontend/Dockerfile.prod \
            --build-arg VITE_API_URL=/api \
            --tag ${{ env.ACR_LOGIN_SERVER }}/pmis-frontend:${{ env.APP_VERSION }} \
            --tag ${{ env.ACR_LOGIN_SERVER }}/pmis-frontend:latest \
            .
          docker push ${{ env.ACR_LOGIN_SERVER }}/pmis-frontend:${{ env.APP_VERSION }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/pmis-frontend:latest

      - name: Deploy Backend Container App
        run: |
          az containerapp update \
            --name ${{ env.BACKEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/pmis-backend:${{ env.APP_VERSION }}

      - name: Deploy Frontend Container App
        run: |
          az containerapp update \
            --name ${{ env.FRONTEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/pmis-frontend:${{ env.APP_VERSION }}

      - name: Verify Deployment
        run: |
          echo "✅ 部署完成！"
          echo "Backend:  ${{ env.ACR_LOGIN_SERVER }}/pmis-backend:${{ env.APP_VERSION }}"
          echo "Frontend: ${{ env.ACR_LOGIN_SERVER }}/pmis-frontend:${{ env.APP_VERSION }}"
