# ════════════════════════════════════════════════════════════
# xCloudPMIS — Pull Request 驗證
# ════════════════════════════════════════════════════════════
# 在 PR 建立/更新時自動執行品質檢查
# ════════════════════════════════════════════════════════════
name: 🔍 PR Check

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────
  # 後端檢查
  # ─────────────────────────────────────────────────────────
  backend-check:
    name: 🔧 Backend Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Validate Prisma Schema
        working-directory: backend
        run: npx prisma validate

      - name: Check for security vulnerabilities
        working-directory: backend
        run: npm audit --audit-level=high || true

  # ─────────────────────────────────────────────────────────
  # 前端檢查
  # ─────────────────────────────────────────────────────────
  frontend-check:
    name: ⚛️ Frontend Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build check
        working-directory: frontend
        env:
          VITE_API_URL: /api
        run: npm run build

      - name: Check bundle size
        working-directory: frontend
        run: |
          DIST_SIZE=$(du -sh dist/ | cut -f1)
          echo "📦 Frontend bundle size: $DIST_SIZE"
          echo "### 📦 Frontend Bundle" >> $GITHUB_STEP_SUMMARY
          echo "Size: \`$DIST_SIZE\`" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────
  # Docker 建置驗證（不推送）
  # ─────────────────────────────────────────────────────────
  docker-check:
    name: 🐳 Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backend/Dockerfile.prod
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build Frontend Image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend/Dockerfile.prod
          push: false
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─────────────────────────────────────────────────────────
  # PR 摘要
  # ─────────────────────────────────────────────────────────
  pr-summary:
    name: 📋 PR Summary
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check, docker-check]
    if: always()
    steps:
      - name: Generate PR summary
        run: |
          echo "## 🔍 PR 檢查結果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 檢查項目 | 結果 |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 Backend | ${{ needs.backend-check.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚛️ Frontend | ${{ needs.frontend-check.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker Build | ${{ needs.docker-check.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
