# ════════════════════════════════════════════════════════════
# xCloudPMIS — Production Docker Compose
# ════════════════════════════════════════════════════════════
# 用途：地端 / 私有雲正式部署
# 啟動：docker compose -f docker-compose.prod.yml up -d
#
# 服務清單：
#   pmis-nginx         → 反向代理入口（:443, :80）
#   pmis-frontend      → React SPA（Nginx 靜態服務）
#   pmis-backend       → Express API（Node.js）
#   pmis-collab        → Yjs 即時協作 WebSocket
#   pmis-db            → PostgreSQL 15
#   pmis-redis         → Redis 7
#   pmis-monitor       → AI 風險掃描代理（背景）
# ════════════════════════════════════════════════════════════

x-common-env: &common-env
  TZ: Asia/Taipei

x-restart-policy: &restart-policy
  restart: unless-stopped

services:

  # ── Nginx Reverse Proxy ──────────────────────────────────
  pmis-nginx:
    image: nginx:1.25-alpine
    container_name: pmis-nginx
    <<: *restart-policy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      pmis-frontend:
        condition: service_healthy
      pmis-backend:
        condition: service_healthy
    networks:
      - pmis-net
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Frontend（靜態 SPA）──────────────────────────────────
  pmis-frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_WS_URL: ${VITE_WS_URL:-wss://your-domain/collab}
        VITE_APP_VERSION: ${APP_VERSION:-1.0.0}
    image: pmis-frontend:${APP_VERSION:-latest}
    container_name: pmis-frontend
    <<: *restart-policy
    expose:
      - "80"
    networks:
      - pmis-net
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── Backend API ──────────────────────────────────────────
  pmis-backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.prod
    image: pmis-backend:${APP_VERSION:-latest}
    container_name: pmis-backend
    <<: *restart-policy
    expose:
      - "3010"
    env_file:
      - .env
    environment:
      <<: *common-env
      NODE_ENV: production
      PORT: 3010
      DB_HOST: pmis-db
      REDIS_HOST: pmis-redis
    depends_on:
      pmis-db:
        condition: service_healthy
      pmis-redis:
        condition: service_healthy
    networks:
      - pmis-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # ── Yjs 即時協作伺服器 ───────────────────────────────────
  pmis-collab:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.prod
    image: pmis-backend:${APP_VERSION:-latest}
    container_name: pmis-collab
    <<: *restart-policy
    expose:
      - "1234"
    env_file:
      - .env
    environment:
      <<: *common-env
      NODE_ENV: production
    command: ["node", "services/collaboration/yjsServer.js"]
    depends_on:
      pmis-redis:
        condition: service_healthy
      pmis-db:
        condition: service_healthy
    networks:
      - pmis-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── AI 風險掃描監控代理 ──────────────────────────────────
  pmis-monitor:
    image: pmis-backend:${APP_VERSION:-latest}
    container_name: pmis-monitor
    <<: *restart-policy
    env_file:
      - .env
    environment:
      <<: *common-env
      NODE_ENV: production
    command: ["node", "jobs/monitorAgent.js"]
    depends_on:
      pmis-backend:
        condition: service_healthy
    networks:
      - pmis-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── PostgreSQL 15 ────────────────────────────────────────
  pmis-db:
    image: postgres:15-alpine
    container_name: pmis-db
    <<: *restart-policy
    expose:
      - "5432"
    env_file:
      - .env
    environment:
      <<: *common-env
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
      - ./database/dashboard_views.sql:/docker-entrypoint-initdb.d/99_dashboard_views.sql:ro
    networks:
      - pmis-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ── Redis 7 ─────────────────────────────────────────────
  pmis-redis:
    image: redis:7-alpine
    container_name: pmis-redis
    <<: *restart-policy
    expose:
      - "6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - pmis-net
    environment:
      <<: *common-env
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

# ── Named Volumes ────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

# ── Networks ─────────────────────────────────────────────────
networks:
  pmis-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
