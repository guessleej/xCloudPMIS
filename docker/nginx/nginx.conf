# ════════════════════════════════════════════════════════════
# xCloudPMIS — Nginx Reverse Proxy（Production Gateway）
# ════════════════════════════════════════════════════════════
# 統一入口：
#   /          → Frontend (pmis-frontend:80)
#   /api/      → Backend  (pmis-backend:3010)
#   /auth/     → Backend  (pmis-backend:3010)
#   /health    → Backend  (pmis-backend:3010)
#   /collab/   → Collaboration WebSocket (pmis-collab:1234)
# ════════════════════════════════════════════════════════════

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日誌格式（含回應時間，便於效能監控）
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # 隱藏 Nginx 版本
    server_tokens off;

    # Gzip 全域壓縮
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── Upstream 定義 ──────────────────────────────────────
    upstream backend {
        server pmis-backend:3010;
        keepalive 32;
    }

    upstream frontend {
        server pmis-frontend:80;
        keepalive 16;
    }

    upstream collaboration {
        server pmis-collab:1234;
    }

    # ── HTTP Server（自動 redirect 到 HTTPS）──────────────
    server {
        listen 80;
        server_name _;

        # 健康檢查不 redirect（Load Balancer 探針用）
        location = /nginx-health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # 其餘流量 redirect 至 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Server ───────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL 憑證（Let's Encrypt 或自簽憑證）
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # SSL 安全設定
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling on;
        ssl_stapling_verify on;

        # HSTS（正式環境請開啟）
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # 安全 Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── API 路由 → Backend ─────────────────────────────
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;

            # CORS（如前後端同域則不需要）
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Requested-With" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ── Auth 路由 → Backend ────────────────────────────
        location /auth/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Health Check → Backend ─────────────────────────
        location = /health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Collaboration WebSocket ────────────────────────
        location /collab/ {
            proxy_pass http://collaboration/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;  # WebSocket 長連接
        }

        # ── Frontend（所有其他路由）───────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # SPA 支援（如 frontend 沒回傳則 fallback index.html）
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }
    }
}
